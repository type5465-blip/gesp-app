<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4A90D9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Python GESP 一级助考</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐍</text></svg>">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="app-header">
        <h1 class="app-title">🐍 Python GESP 一级助考</h1>
    </header>

    <!-- 主内容区域 -->
    <main class="app-main">
        <!-- 首页视图 -->
        <section id="view-home" class="view active">
            <div class="welcome-card">
                <div class="welcome-icon">🎓</div>
                <h2>欢迎来到Python学习助手</h2>
                <p>专为GESP一级考级设计，轻松备考，高效学习！</p>
            </div>

            <div class="stats-row" id="stats-row">
                <div class="stat-card">
                    <div class="stat-number" id="stat-questions">0</div>
                    <div class="stat-label">已练习</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="stat-accuracy">0%</div>
                    <div class="stat-label">正确率</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="stat-exams">0</div>
                    <div class="stat-label">模拟考</div>
                </div>
            </div>

            <div class="feature-grid">
                <div class="feature-card" onclick="navigateTo('learn')">
                    <div class="feature-icon">📚</div>
                    <div class="feature-title">知识点学习</div>
                    <div class="feature-desc">12个考点，系统学习</div>
                </div>
                <div class="feature-card" onclick="navigateTo('practice')">
                    <div class="feature-icon">✏️</div>
                    <div class="feature-title">专项练习</div>
                    <div class="feature-desc">按知识点分类练习</div>
                </div>
                <div class="feature-card" onclick="startExam()">
                    <div class="feature-icon">🏆</div>
                    <div class="feature-title">模拟考试</div>
                    <div class="feature-desc">限时45题，60分钟</div>
                </div>
                <div class="feature-card" onclick="navigateTo('wrong')">
                    <div class="feature-icon">📝</div>
                    <div class="feature-title">错题本</div>
                    <div class="feature-desc">温故知新，查漏补缺</div>
                </div>
                <div class="feature-card" onclick="navigateTo('exam-list')">
                    <div class="feature-icon">📋</div>
                    <div class="feature-title">真题实战</div>
                    <div class="feature-desc">近两年真题，全真模拟</div>
                </div>
            </div>
        </section>

        <!-- 知识点学习视图 -->
        <section id="view-learn" class="view">
            <div class="section-header">
                <button class="btn-back" onclick="navigateTo('home')">← 返回</button>
                <h2>📚 知识点学习</h2>
            </div>
            <div class="topic-list" id="topic-list"></div>
        </section>

        <!-- 知识点详情视图 -->
        <section id="view-topic-detail" class="view">
            <div class="section-header">
                <button class="btn-back" onclick="navigateTo('learn')">← 返回</button>
                <h2 id="topic-detail-title">知识点</h2>
            </div>
            <div class="topic-content" id="topic-content"></div>
        </section>

        <!-- 练习视图 -->
        <section id="view-practice" class="view">
            <div class="section-header">
                <button class="btn-back" onclick="navigateTo('home')">← 返回</button>
                <h2>✏️ 专项练习</h2>
            </div>
            <div class="topic-list" id="practice-topic-list"></div>
        </section>

        <!-- 答题视图 -->
        <section id="view-quiz" class="view">
            <div class="quiz-header">
                <button class="btn-back" onclick="confirmQuitQuiz()">← 退出</button>
                <div class="quiz-progress">
                    <span id="quiz-progress-text">1/10</span>
                </div>
                <div class="quiz-timer" id="quiz-timer" style="display:none;">⏱ 60:00</div>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="quiz-progress-bar" style="width: 0%;"></div>
            </div>
            <div class="quiz-card" id="quiz-card">
                <div class="section-badge single-choice" id="section-badge" style="display:none;"></div>
                <div class="question-number" id="question-number"></div>
                <div class="question-text" id="question-text"></div>
                <div class="question-code" id="question-code" style="display:none;"></div>
                <div class="options-list" id="options-list"></div>
                <!-- 编程题展示区 -->
                <div id="programming-display" style="display:none;"></div>
                <!-- 即时解析区 -->
                <div class="explanation-inline" id="explanation-inline">
                    <div class="exp-header">💡 解析</div>
                    <div id="explanation-text"></div>
                </div>
            </div>
            <button class="btn-submit" id="btn-submit-answer" onclick="submitAnswer()">确认答案</button>
        </section>

        <!-- 结果视图 -->
        <section id="view-result" class="view">
            <div class="result-card">
                <div class="result-icon" id="result-icon">🎉</div>
                <h2 id="result-title">练习完成!</h2>
                <div class="result-score" id="result-score">8/10</div>
                <div class="result-detail" id="result-detail"></div>
                <div class="result-actions">
                    <button class="btn-primary" id="btn-result-review" onclick="reviewAnswers()">查看解析</button>
                    <button class="btn-secondary" onclick="navigateTo('home')">返回首页</button>
                    <button class="btn-outline" id="btn-retry-wrong" onclick="retryWrong()" style="display:none;">重做错题</button>
                </div>
            </div>
            <div class="review-list" id="review-list" style="display:none;"></div>
        </section>

        <!-- 真题列表视图 -->
        <section id="view-exam-list" class="view">
            <div class="section-header">
                <button class="btn-back" onclick="navigateTo('home')">← 返回</button>
                <h2>📋 真题实战</h2>
            </div>
            <div class="exam-list" id="exam-list"></div>
        </section>

        <!-- 错题本视图 -->
        <section id="view-wrong" class="view">
            <div class="section-header">
                <button class="btn-back" onclick="navigateTo('home')">← 返回</button>
                <h2>📝 错题本</h2>
            </div>
            <div id="wrong-list" class="wrong-list">
                <div class="empty-state" id="wrong-empty">
                    <div class="empty-icon">🌟</div>
                    <p>还没有错题，继续保持！</p>
                </div>
            </div>
        </section>
    </main>

    <!-- 底部导航栏 -->
    <nav class="bottom-nav">
        <div class="nav-item active" data-nav="home" onclick="navigateTo('home')">
            <div class="nav-icon">🏠</div>
            <div class="nav-label">首页</div>
        </div>
        <div class="nav-item" data-nav="learn" onclick="navigateTo('learn')">
            <div class="nav-icon">📚</div>
            <div class="nav-label">学习</div>
        </div>
        <div class="nav-item" data-nav="practice" onclick="navigateTo('practice')">
            <div class="nav-icon">✏️</div>
            <div class="nav-label">练习</div>
        </div>
        <div class="nav-item" data-nav="wrong" onclick="navigateTo('wrong')">
            <div class="nav-icon">📝</div>
            <div class="nav-label">错题</div>
        </div>
    </nav>

    <!-- 确认弹窗 -->
    <div class="modal-overlay" id="modal-overlay" style="display:none;">
        <div class="modal-card">
            <div class="modal-title" id="modal-title">提示</div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-actions">
                <button class="btn-secondary" id="modal-cancel" onclick="closeModal()">取消</button>
                <button class="btn-primary" id="modal-confirm" onclick="confirmModal()">确认</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
